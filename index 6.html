<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMBRAL - Horror Game Menu</title>
    <!-- Connecting the external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-glow-darkblue"></div>

    <div class="menu-container">
        
        <header>
            <h1 class="title">UMBRAL</h1>
        </header>

        <!-- Structured Content Area -->
        <section class="content-grid">
            <div class="content-card">
                <div class="card-title">Active Users</div>
                <div class="card-value">1,482</div>
            </div>
            <div class="content-card">
                <div class="card-title">Ping</div>
                <div class="card-value">24ms</div>
            </div>
            <div class="content-card">
                <div class="card-title">Difficulty</div>
                <div class="card-value" style="color: #4a8aff;">Normal</div>
            </div>
            <div class="content-card">
                <div class="card-title">System Integrity</div>
                <div class="card-value">0%</div>
                <progress value="0" max="100"></progress>
            </div>
        </section>

        <nav>
            <ul class="nav-list">
                <li><a href="#" class="nav-link active-cta">Play</a></li> 
                <li><a href="#" class="nav-link">Settings</a></li>
                <li><a href="#" class="nav-link">Credits</a></li>
                <li><a href="#" class="nav-link">Exit Game</a></li>
            </ul>
        </nav>

        <footer class="footer-section">
            <p class="footer-text">Corrupted Build 2.0.6 &bull; © 2026 Unknown Source</p>
            <p class="credits-text">Art: Umbral Cyber-Oni Concept • Built with CSS Grid & Flexbox</p>
        </footer>

    </div>

</body>
</html>
